# CI 质量门：每次 PR 或推送到 main 时跑 lint + test + build。
# 与 release.yml 解耦 —— 后者由 tag 推送独立触发，不依赖本工作流。
# 失败的 PR 不应合并；推到 main 后失败的话，下一次发版前必须修。

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # 排除 tag 推送 —— tag 由 release.yml 处理，不重复跑。
    tags-ignore: ['v*']

# 同一分支/PR 重复推送时取消旧 run。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Test + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint, --max-warnings 0)
        run: bun run lint

      - name: Test (Vitest)
        run: bun run test:run

      - name: Build (tsc -b + Vite)
        run: bun run build
