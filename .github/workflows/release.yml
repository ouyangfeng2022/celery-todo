# Release 工作流：tag 推送 → 自动构建 NSIS 安装包 → 创建 GitHub Release。
#
# 触发条件：推送形如 v* 的 tag（由 `bun run bump -- <kind> --push` 完成的最后一步）。
# 链路中的版本号一致性来源：
#   - tag 名称（vX.Y.Z）
#   - package.json 的 version 字段（bump 脚本已写好）
#   - electron-builder 生成的安装包元数据（自动读 package.json:version）
#   - Release 名称（取自 tag）
#   - Release 正文（从 CHANGELOG.md 抽取对应版本块，scripts/extract-changelog.mjs）
#
# 发版前置质量门：release job 通过 needs: [quality] 依赖同 workflow 内的 quality
# job（lint + test + build）。v2.5.1 事故教训：本 workflow 由 tag 推送独立触发，
# 不等 ci.yml 完成，曾导致测试挂了但安装包照发。quality job 作为发版链路自带的
# 第二道闸，确保测试不通过时不打包、不发版。
#
# 详见仓库根目录 VERSIONING.md「GitHub 全链路」一节。

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: '要发版的 tag 或 ref（默认使用当前分支 HEAD）'
        required: false
        default: ''

# 同一 tag 重复触发时取消旧 run，避免并发发布。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # 创建 Release、上传 asset 必需

jobs:
  # 发版前置质量门：lint + test + build 全绿才允许打包发版。
  # step 与 ci.yml 完全一致，在 tag 触发时多跑一次作为发版链路自带的第二道闸。
  quality:
    name: Pre-release gate (lint + test + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # workflow_dispatch 时 fallback 到传入 ref，与 release job 一致。
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint, --max-warnings 0)
        run: bun run lint

      - name: Test (Vitest)
        run: bun run test:run

      - name: Build (tsc -b + Vite)
        run: bun run build

  release:
    name: Build & Release (Windows NSIS)
    runs-on: windows-latest
    # 前置质量门：quality 失败时不打包、不发版。
    needs: [quality]

    steps:
      - name: Checkout
        # v5 默认运行在 Node.js 24 上，消除 Node 20 deprecation 警告
        uses: actions/checkout@v5
        with:
          # tag 触发时 ref 已指向 tag commit；workflow_dispatch 时 fallback 到 HEAD。
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          # tag 形如 refs/tags/v1.2.3 → 取 "v1.2.3"
          TAG="${GITHUB_REF##*/}"
          # workflow_dispatch 时没有 tag，回退到 package.json
          if [ -z "$TAG" ] || [ "$TAG" = "HEAD" ]; then
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "正在发版 $TAG"

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          PKG_VER="v$(node -p "require('./package.json').version")"
          TAG="${{ steps.ver.outputs.tag }}"
          if [ "$PKG_VER" != "$TAG" ]; then
            echo "::error::版本不一致：package.json=$PKG_VER 但 tag=$TAG"
            echo "::error::请确认 bump 脚本是否已写回 package.json，或 tag 是否打错。"
            exit 1
          fi
          echo "✓ package.json ($PKG_VER) 与 tag ($TAG) 一致"

      - name: Build installer (electron-builder)
        # 走完整的 electron:build 流水线（vite build + tsc + fix-cjs + electron-builder），
        # 但在 electron-builder 阶段用 --publish never 显式禁用上传 ——
        # package.json 里的 build.publish 配置是给本地手动发布用的；
        # CI 里 Release 由后续 "Create GitHub Release" 步骤独立完成。
        # --publish never 是命令行标志，优先级高于 build.publish 配置。
        run: bun run electron:build -- --publish never

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          # 把对应版本块写到 release-notes.md，供后续 release-create 步骤读取。
          node scripts/extract-changelog.mjs '${{ steps.ver.outputs.tag }}' > release-notes.md
          echo "----- release notes 预览 -----"
          cat release-notes.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: celery-todo-${{ steps.ver.outputs.tag }}-installer
          path: |
            release/*.exe
            release/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # 已存在则跳过（重跑 workflow 时幂等）。
          if gh release view '${{ steps.ver.outputs.tag }}' >/dev/null 2>&1; then
            echo "Release ${{ steps.ver.outputs.tag }} 已存在，跳过创建。"
            exit 0
          fi
          gh release create '${{ steps.ver.outputs.tag }}' \
            --title '${{ steps.ver.outputs.tag }}' \
            --notes-file release-notes.md \
            release/*.exe release/latest*.yml
