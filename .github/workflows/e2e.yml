# E2E 工作流：用 Playwright 驱动真实 Electron 应用做端到端测试。
#
# 触发：PR 到 main 或手动 workflow_dispatch。
# 与 ci.yml（lint + vitest unit + build）解耦，单独跑在 windows-latest 上，
# 与 release.yml 的构建目标平台一致（NSIS Windows）。
#
# 数据隔离：每个测试用独立临时 userData 目录（helpers.launchApp 经
# CELERY_TODO_USERDATA 环境变量传给主进程），不污染也不冲突单实例锁。

name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright Electron E2E
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run e2e:install

      - name: Run E2E tests
        run: bun run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test artifacts (screenshots/traces/videos)
        uses: actions/upload-artifact@v5
        if: ${{ failure() }}
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
